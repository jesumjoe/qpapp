kind = "web"
previewPath = "/"
title = "Revision App"
version = "1.0.0"
id = "artifacts/revision-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23912

[services.development]
run = "pnpm --filter @workspace/revision-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/revision-app", "run", "build" ]
publicDir = "artifacts/revision-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23912"
BASE_PATH = "/"
