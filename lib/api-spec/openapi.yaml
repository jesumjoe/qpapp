openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: grades
    description: Grade/Semester management
  - name: subjects
    description: Subject management
  - name: papers
    description: Question paper management
  - name: questions
    description: Question management
  - name: revision
    description: Revision session endpoints
  - name: storage
    description: File storage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List all grades/semesters
      responses:
        "200":
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"
    post:
      operationId: createGrade
      tags: [grades]
      summary: Create a grade/semester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGradeBody"
      responses:
        "201":
          description: Created grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

  /grades/{gradeId}:
    get:
      operationId: getGrade
      tags: [grades]
      summary: Get a grade by ID
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"
        "404":
          description: Not found
    delete:
      operationId: deleteGrade
      tags: [grades]
      summary: Delete a grade
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grades/{gradeId}/subjects:
    get:
      operationId: listSubjectsByGrade
      tags: [subjects]
      summary: List subjects for a grade
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject under a grade
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectBody"
      responses:
        "201":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{subjectId}:
    get:
      operationId: getSubject
      tags: [subjects]
      summary: Get a subject by ID
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
        "404":
          description: Not found
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /subjects/{subjectId}/papers:
    get:
      operationId: listPapersBySubject
      tags: [papers]
      summary: List papers for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of papers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Paper"
    post:
      operationId: createPaper
      tags: [papers]
      summary: Create a paper record under a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaperBody"
      responses:
        "201":
          description: Created paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"

  /papers/{paperId}:
    get:
      operationId: getPaper
      tags: [papers]
      summary: Get a paper by ID
      parameters:
        - name: paperId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"
        "404":
          description: Not found
    delete:
      operationId: deletePaper
      tags: [papers]
      summary: Delete a paper
      parameters:
        - name: paperId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /papers/{paperId}/extract:
    post:
      operationId: extractQuestionsFromPaper
      tags: [papers]
      summary: Trigger AI extraction of questions from an uploaded paper
      parameters:
        - name: paperId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"
        "404":
          description: Not found

  /subjects/{subjectId}/questions:
    get:
      operationId: listQuestionsBySubject
      tags: [questions]
      summary: List all questions for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /subjects/{subjectId}/stats:
    get:
      operationId: getSubjectStats
      tags: [subjects]
      summary: Get stats for a subject (question counts by marks)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subject stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectStats"

  /revision/questions:
    get:
      operationId: getRevisionQuestions
      tags: [revision]
      summary: Get questions for a revision session, weighted by mark value
      parameters:
        - name: subjectId
          in: query
          required: true
          schema:
            type: integer
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: marksFilter
          in: query
          required: false
          description: Comma-separated list of mark values to filter by (e.g. "1,2,5")
          schema:
            type: string
      responses:
        "200":
          description: Weighted list of questions for revision
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /subjects/{subjectId}/attempts:
    post:
      operationId: recordAttempts
      tags: [revision]
      summary: Record the results of a revision session
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAttemptsBody"
      responses:
        "201":
          description: Attempts recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordAttemptsResult"

  /subjects/{subjectId}/performance:
    get:
      operationId: getSubjectPerformance
      tags: [revision]
      summary: Get performance stats and accuracy trend for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Performance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectPerformance"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Grade:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        level:
          type: string
          description: e.g. "Grade 10", "Semester 3", "Year 2"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - level
        - createdAt

    CreateGradeBody:
      type: object
      properties:
        name:
          type: string
        level:
          type: string
      required:
        - name
        - level

    Subject:
      type: object
      properties:
        id:
          type: integer
        gradeId:
          type: integer
        name:
          type: string
        code:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - gradeId
        - name
        - createdAt

    CreateSubjectBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
      required:
        - name

    Paper:
      type: object
      properties:
        id:
          type: integer
        subjectId:
          type: integer
        year:
          type: integer
        title:
          type: string
        fileObjectPath:
          type: string
          nullable: true
        extractionStatus:
          type: string
          enum: [pending, processing, done, failed]
        questionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - subjectId
        - year
        - title
        - extractionStatus
        - questionCount
        - createdAt

    CreatePaperBody:
      type: object
      properties:
        year:
          type: integer
        title:
          type: string
        fileObjectPath:
          type: string
          nullable: true
      required:
        - year
        - title

    Question:
      type: object
      properties:
        id:
          type: integer
        paperId:
          type: integer
        subjectId:
          type: integer
        questionText:
          type: string
        answerText:
          type: string
        marks:
          type: integer
        topic:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - paperId
        - subjectId
        - questionText
        - answerText
        - marks
        - createdAt

    ExtractionResult:
      type: object
      properties:
        paperId:
          type: integer
        questionsExtracted:
          type: integer
        status:
          type: string
          enum: [done, failed]
        message:
          type: string
          nullable: true
      required:
        - paperId
        - questionsExtracted
        - status

    SubjectStats:
      type: object
      properties:
        subjectId:
          type: integer
        totalQuestions:
          type: integer
        totalPapers:
          type: integer
        questionsByMarks:
          type: array
          items:
            type: object
            properties:
              marks:
                type: integer
              count:
                type: integer
            required:
              - marks
              - count
        recentPapers:
          type: array
          items:
            $ref: "#/components/schemas/Paper"
      required:
        - subjectId
        - totalQuestions
        - totalPapers
        - questionsByMarks
        - recentPapers

    RecordAttemptsBody:
      type: object
      properties:
        sessionId:
          type: string
        attempts:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: integer
              correct:
                type: boolean
            required:
              - questionId
              - correct
      required:
        - sessionId
        - attempts

    RecordAttemptsResult:
      type: object
      properties:
        recorded:
          type: integer
        sessionId:
          type: string
      required:
        - recorded
        - sessionId

    AccuracyByMarks:
      type: object
      properties:
        marks:
          type: integer
        accuracy:
          type: number
        totalAttempts:
          type: integer
      required:
        - marks
        - accuracy
        - totalAttempts

    AccuracyTrendPoint:
      type: object
      properties:
        date:
          type: string
          format: date-time
        accuracy:
          type: number
        sessionId:
          type: string
      required:
        - date
        - accuracy
        - sessionId

    SessionPerformance:
      type: object
      properties:
        sessionId:
          type: string
        date:
          type: string
          format: date-time
        accuracy:
          type: number
        totalQuestions:
          type: integer
        correctAnswers:
          type: integer
      required:
        - sessionId
        - date
        - accuracy
        - totalQuestions
        - correctAnswers

    SubjectPerformance:
      type: object
      properties:
        subjectId:
          type: integer
        overallAccuracy:
          type: number
        totalAttempts:
          type: integer
        totalSessions:
          type: integer
        recentSessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionPerformance"
        accuracyByMarks:
          type: array
          items:
            $ref: "#/components/schemas/AccuracyByMarks"
        accuracyTrend:
          type: array
          items:
            $ref: "#/components/schemas/AccuracyTrendPoint"
      required:
        - subjectId
        - overallAccuracy
        - totalAttempts
        - totalSessions
        - recentSessions
        - accuracyByMarks
        - accuracyTrend

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath
